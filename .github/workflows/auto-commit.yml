name: Auto Commit Activity

on:
  schedule:
    - cron: "40 18 * * *"   # 12:10 AM IST
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "esha-dey-22"
          git config user.email "edey38111@gmail.com"

      - name: Update activity log
        run: |
          mkdir -p activity
          echo "Last activity: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > activity/log.md
          echo "" >> activity/log.md
          echo "### Random DSA Tip of the Day" >> activity/log.md
          tips=(
            "Always analyze time complexity before coding."
            "Two-pointer technique saves O(n) space in many problems."
            "Binary search works on any monotonic function, not just sorted arrays."
            "Sliding window is two-pointer's smarter cousin."
            "Memoization = recursion + cache. Start there before tabulation."
            "DFS uses a stack (implicit or explicit). BFS uses a queue. Always."
            "For graph problems, always clarify: directed or undirected? Weighted?"
            "Prefix sums solve subarray sum problems in O(1) per query."
            "Topological sort = BFS (Kahn's) or DFS on a DAG."
            "Recursion is just trust — trust the function handles the subproblem."
            "HashMap lookups are O(1) average — use them aggressively."
            "Always consider integer overflow when multiplying large numbers."
            "In-place reversal of a linked list needs three pointers: prev, curr, next."
            "Monotonic stack solves next greater element in O(n)."
            "For interval problems, always sort by start time first."
            "Union-Find is the cleanest solution for cycle detection in undirected graphs."
            "Backtracking = try everything, undo what doesn't work."
            "Floyd's cycle detection uses slow and fast pointers."
            "Trie is the go-to for prefix search problems."
            "Kadane's algorithm finds max subarray sum in O(n)."
          )
          random_tip=${tips[$RANDOM % ${#tips[@]}]}
          echo "> $random_tip" >> activity/log.md

      - name: Commit and push
        run: |
          git add activity/log.md
          git diff --staged --quiet || git commit -m "chore: daily activity log [$(date -u '+%Y-%m-%d')]"
          git push
